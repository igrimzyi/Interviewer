<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <!-- makes layout responsive on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnterView — Login</title>

    <!-- Tailwind for quick styling -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-white">
    <main class="min-h-screen flex flex-col items-center justify-center px-4">

        <!-- simple brand / header area -->
        <div class="flex flex-col items-center">
            <div class="h-9 w-9 rounded-full border border-[#E2E8F0] bg-white grid place-items-center shadow-sm"
                aria-hidden="true">
                <span class="text-[#0F172B] text-sm"><!-- logo --></span>
            </div>

            <h1 class="mt-3 text-lg font-semibold text-[#0F172B]">EnterView</h1>
            <p class="mt-1 text-sm text-[#45556C]">Sign in to your account</p>
        </div>

        <!-- login card -->
        <section class="mt-6 w-full max-w-sm rounded-xl border border-[#E2E8F0] bg-white px-6 py-6 shadow-sm"
            aria-labelledby="welcome-title">

            <h2 id="welcome-title" class="text-sm font-semibold text-[#0F172B]">Welcome back</h2>
            <p class="mt-1 text-xs text-[#45556C]">Enter your credentials to continue</p>

            <!-- error message from login API -->
            <div id="errorBox"
                class="hidden mt-4 rounded-md border border-[#E2E8F0] bg-white px-3 py-2 text-xs text-[#45556C]"
                role="alert" aria-live="polite"></div>

            <form class="mt-5 space-y-4" id="loginForm">

                <!-- email input -->
                <div>
                    <label for="email" class="block text-xs font-medium text-[#0F172B]">Email</label>
                    <input id="email" name="email" type="email" required autocomplete="email"
                        placeholder="you@gmail.com"
                        class="mt-1 w-full rounded-md border border-[#E2E8F0] bg-gray-50 px-3 py-2 text-sm text-[#0F172B] outline-none focus:bg-white focus:ring-2 focus:ring-[#155DFC]/30" />
                </div>

                <!-- password field + forgot link -->
                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-xs font-medium text-[#0F172B]">Password</label>
                        <a href="#" class="text-xs font-medium text-[#155DFC] hover:underline">
                            Forgot password?
                        </a>
                    </div>

                    <input id="password" name="password" type="password" required autocomplete="current-password"
                        placeholder="••••••••"
                        class="mt-1 w-full rounded-md border border-[#E2E8F0] bg-gray-50 px-3 py-2 text-sm text-[#0F172B] outline-none focus:bg-white focus:ring-2 focus:ring-[#155DFC]/30" />
                </div>

                <!-- submit login -->
                <button type="submit"
                    class="mt-1 w-full rounded-md bg-[#0F172B] py-2 text-sm font-semibold text-white shadow-sm hover:opacity-95 active:opacity-90">
                    Sign in
                </button>

                <!-- sign up link -->
                <p class="pt-1 text-center text-xs text-[#45556C]">
                    Don't have an account?
                    <a href="#" class="font-medium text-[#155DFC] hover:underline">Sign up</a>
                </p>
            </form>
        </section>
    </main>

    <!-- handles login API call -->
    <script src="/login/script.js"></script>

</body>

</html>
